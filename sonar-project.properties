sonar.projectKey=ai-core
sonar.projectName=AI-CORE
sonar.projectVersion=2.6.3

sonar.sources=scripts
sonar.exclusions=**/node_modules/**,**/*.test.js,**/docs/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gates
# Coverage > 80%
sonar.coverage.exclusions=**/dry-run-cost-sim.js,**/init-backlog.js,**/session-close.js

# Duplicated Lines < 3%
sonar.cpd.exclusions=**/node_modules/**

# Security Rating A
sonar.security.sources=scripts/anthropic-bridge.js,scripts/mcp-anthropic.js,scripts/mcp-gemini.js

sonar.sourceEncoding=UTF-8
